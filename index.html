<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEOPOLITICS — Inteligencia Global</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
:root{
  --bg:#080c10;--sur:#0d1318;--sur2:#111820;--bor:#1e2d3d;
  --acc:#00d4ff;--acc2:#ff6b35;--acc3:#7fff6e;
  --tx:#e8eef4;--txm:#6b8299;--txd:#3a5068;
  --pw:580px;--mw:160px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Space Mono',monospace;cursor:crosshair;}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;background:rgba(8,12,16,.97);border-bottom:1px solid var(--bor);}
#logo{display:flex;align-items:baseline;gap:10px;}
#logo h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:.18em;text-transform:uppercase;}
#logo span{font-size:.55rem;color:var(--acc);letter-spacing:.3em;text-transform:uppercase;opacity:.8;}
#sw{position:relative;}
#sb{display:flex;align-items:center;gap:8px;background:var(--sur);border:1px solid var(--bor);border-radius:3px;padding:6px 12px;width:240px;transition:border-color .2s;}
#sb:focus-within{border-color:var(--acc);}
#sb input{background:none;border:none;outline:none;color:var(--tx);font-family:'Space Mono',monospace;font-size:.7rem;width:100%;}
#sb input::placeholder{color:var(--txd);}
#sico{color:var(--txd);font-size:.9rem;}
#sres{position:absolute;top:100%;left:0;width:100%;max-height:220px;overflow-y:auto;background:var(--sur);border:1px solid var(--acc);border-top:none;z-index:9999;display:none;}
.sri{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;font-size:.7rem;border-bottom:1px solid var(--bor);transition:background .15s;}
.sri:hover{background:var(--sur2);}
.sri .sf{font-size:1rem;}.sri .sn{color:var(--tx);}.sri .sr2{font-size:.55rem;color:var(--txd);margin-left:auto;}
#hs{display:flex;align-items:center;gap:20px;}
.h .v{font-family:'Syne',sans-serif;font-size:.8rem;color:var(--acc);font-weight:700;text-align:right;}
.h .l{font-size:.52rem;color:var(--txd);letter-spacing:.15em;text-transform:uppercase;}
#live{width:6px;height:6px;border-radius:50%;background:var(--acc3);box-shadow:0 0 8px var(--acc3);animation:bl 2s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

/* MAP */
#mw{position:fixed;top:56px;left:0;right:0;bottom:0;overflow:hidden;background:#050810;}
#ms{width:100%;height:100%;display:block;}
.cp{stroke:#1a2a3a;stroke-width:.4px;fill:#0e1822;cursor:pointer;transition:fill .12s,stroke .12s;}
.cp.hd{fill:#0c2235;stroke:#1e4a6e;stroke-width:.6px;}
.cp.hd:hover{fill:#103a58;stroke:var(--acc);stroke-width:1px;}
.cp.act{fill:#0d4060!important;stroke:var(--acc)!important;stroke-width:1.5px!important;}
.cp:not(.hd):hover{fill:#141f2b;}
#tt{position:fixed;z-index:800;pointer-events:none;background:rgba(13,19,24,.95);border:1px solid var(--acc);padding:5px 13px;border-radius:3px;font-size:.65rem;color:var(--tx);box-shadow:0 0 14px rgba(0,212,255,.18);display:none;white-space:nowrap;}

/* PANEL */
#pnl{
  position:fixed;top:56px;right:0;bottom:0;width:var(--pw);z-index:600;
  background:linear-gradient(180deg,var(--sur) 0%,var(--bg) 100%);
  border-left:1px solid var(--bor);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);
}
#pnl.open{transform:translateX(0);}

/* Panel top: flag + name + close */
#pt{
  padding:22px 26px 16px;flex-shrink:0;
  border-bottom:1px solid var(--bor);
  display:flex;align-items:center;gap:16px;
  position:relative;
}
#cf{font-size:2.4rem;flex-shrink:0;}
#ptxt{flex:1;}
#cn{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;letter-spacing:.03em;line-height:1.1;}
#cr{font-size:.55rem;color:var(--acc);letter-spacing:.22em;text-transform:uppercase;margin-top:4px;}
#pcl{
  background:none;border:1px solid var(--bor);color:var(--txm);
  width:26px;height:26px;border-radius:3px;cursor:pointer;
  font-size:.7rem;display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
#pcl:hover{border-color:var(--acc);color:var(--acc);}

/* Panel body: content + right nav */
#pbody{
  flex:1;display:flex;overflow:hidden;
}

/* Content area */
#pcontent{
  flex:1;overflow-y:auto;padding:20px 22px 28px;
  scrollbar-width:thin;scrollbar-color:var(--bor) transparent;
}
#pcontent::-webkit-scrollbar{width:3px;}
#pcontent::-webkit-scrollbar-thumb{background:var(--bor);}

/* Right nav menu */
#pnav{
  width:var(--mw);flex-shrink:0;
  border-left:1px solid var(--bor);
  display:flex;flex-direction:column;
  padding:16px 0;
  overflow-y:auto;
}
.pnav-item{
  padding:10px 16px;cursor:pointer;
  border-left:2px solid transparent;
  transition:all .2s;
  display:flex;flex-direction:column;gap:3px;
}
.pnav-item:hover{background:var(--sur2);}
.pnav-item.on{border-left-color:var(--acc);background:rgba(0,212,255,.05);}
.pnav-item .ni{font-size:.52rem;color:var(--txd);letter-spacing:.15em;}
.pnav-item .nl{font-size:.65rem;color:var(--txm);letter-spacing:.04em;}
.pnav-item.on .nl{color:var(--acc);}
.pnav-item.on .ni{color:var(--acc);opacity:.6;}
.pnav-item.soon .nl{color:var(--txd);}
.pnav-soon{
  font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--txd);border:1px solid var(--bor);
  padding:2px 6px;border-radius:2px;width:fit-content;margin-top:2px;
}

/* Content blocks */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px;}
.dc{background:var(--sur2);border:1px solid var(--bor);border-radius:3px;padding:11px 13px;transition:border-color .2s;}
.dc:hover{border-color:var(--acc);}
.dc.f{grid-column:1/-1;}
.dc .dl{font-size:.52rem;color:var(--txd);letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px;}
.dc .dv{font-size:.78rem;color:var(--tx);line-height:1.4;}
.dc .dv.big{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;color:var(--acc);}
.st{font-size:.55rem;letter-spacing:.22em;text-transform:uppercase;color:var(--acc2);margin:20px 0 10px;display:flex;align-items:center;gap:10px;}
.st::after{content:'';flex:1;height:1px;background:var(--bor);}
.ab{background:var(--sur2);border:1px solid var(--bor);border-left:3px solid var(--acc);border-radius:0 3px 3px 0;padding:13px 15px;margin-bottom:10px;}
.ab.w{border-left-color:var(--acc2);}
.ab.g{border-left-color:var(--acc3);}
.ab .at{font-size:.57rem;color:var(--acc);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;font-weight:700;}
.ab.w .at{color:var(--acc2);}
.ab.g .at{color:var(--acc3);}
.ab p{font-family:'Crimson Pro',serif;font-size:.92rem;color:var(--txm);line-height:1.75;font-style:italic;}
.sr2x{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.sl{font-size:.57rem;color:var(--txm);text-transform:uppercase;width:115px;flex-shrink:0;}
.sb2{flex:1;height:3px;background:var(--sur2);border-radius:2px;overflow:hidden;}
.sf2{height:100%;border-radius:2px;width:0;transition:width .9s cubic-bezier(.16,1,.3,1);}
.sv{font-size:.6rem;color:var(--txd);width:26px;text-align:right;}
.tgs{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.tg{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.22);color:var(--acc);font-size:.56rem;padding:3px 9px;border-radius:2px;letter-spacing:.08em;text-transform:uppercase;}
.tg.r{background:rgba(255,107,53,.07);border-color:rgba(255,107,53,.22);color:var(--acc2);}
.tg.g2{background:rgba(127,255,110,.07);border-color:rgba(127,255,110,.22);color:var(--acc3);}

/* Soon placeholder */
.soon-block{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 20px;gap:14px;text-align:center;
}
.soon-icon{font-size:2rem;opacity:.4;}
.soon-title{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;color:var(--txm);}
.soon-sub{font-family:'Crimson Pro',serif;font-size:.85rem;color:var(--txd);font-style:italic;line-height:1.6;}
.soon-badge{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--txd);border:1px solid var(--bor);padding:4px 12px;border-radius:2px;}

/* Hint / empty */
#hint{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:500;background:rgba(13,19,24,.92);border:1px solid var(--bor);padding:10px 22px;border-radius:3px;font-size:.62rem;color:var(--txm);letter-spacing:.08em;pointer-events:none;transition:opacity .6s;}
#hint.gone{opacity:0;}
#empty{position:fixed;bottom:78px;left:28px;z-index:400;max-width:240px;}
#empty .et{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:5px;}
#empty .es{font-family:'Crimson Pro',serif;font-size:.88rem;color:var(--txd);line-height:1.6;font-style:italic;}
#empty .el{width:28px;height:2px;background:var(--acc);margin-bottom:10px;}

/* Loading */
#loading{position:fixed;inset:0;top:56px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:50;}
#loading .ld{font-size:.65rem;color:var(--txm);letter-spacing:.2em;text-transform:uppercase;animation:pu 1.5s infinite;}
#loading .bar{width:160px;height:2px;background:var(--bor);border-radius:1px;overflow:hidden;}
#loading .bar::after{content:'';display:block;height:100%;background:var(--acc);border-radius:1px;animation:ld 1.5s infinite;}
@keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes ld{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}

body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:120px;}
</style>
</head>

    pol:{system:"Monarquía Constitucional Parlamentaria",je:"Emperador Naruhito",jg:"Shigeru Ishiba",party:"PLD (coalición)",orgs:["G7","G20","ONU","OCDE"],scores:{Democracia:83,Estabilidad:80,"Lib. Prensa":68,Transparencia:73},tags:["Democracia estable","Alianza con EEUU","Rearme estratégico"],ov:"Japón es una democracia parlamentaria con larga hegemonía del PLD. Bajo presión de China y Corea del Norte, ha iniciado el mayor rearme militar desde la Segunda Guerra Mundial."},
    an:{pos:"Japón es el principal aliado de EEUU en el Indo-Pacífico y una potencia económica de primer orden.",ten:"La amenaza norcoreana, la tensión en el Mar de China Oriental y el envejecimiento demográfico son los principales focos de riesgo.",out:"Japón apuesta por un papel militar más activo. Su capacidad de reindustrializarse determinará su relevancia en el siglo XXI.",risk:"MEDIO",inf:"REGIONAL",tgs:["Aliado EEUU Indo-Pacífico","Rearme activo","Potencia tecnológica","Diplomacia multilateral"]}},
  "India":{flag:"🇮🇳",name:"India",region:"Asia del Sur",
    basic:{capital:"Nueva Delhi",population:"1,428M",area:"3,287,263 km²",language:"Hindi / Inglés",currency:"Rupia (₹)",gdp:"$3.73T",gdp_pc:"$2,612",hdi:"0.644"},
    pol:{system:"República Federal Parlamentaria",je:"Droupadi Murmu",jg:"Narendra Modi",party:"BJP (coalición NDA)",orgs:["G20","BRICS+","ONU","SCO","Quad"],scores:{Democracia:61,Estabilidad:64,"Lib. Prensa":45,Transparencia:40},tags:["Democracia más poblada","Potencia emergente","No-alineamiento activo"],ov:"India es la democracia más poblada del mundo. Bajo Modi y el BJP ha virado hacia un nacionalismo hindú más pronunciado. Practica una política exterior de autonomía estratégica."},
    an:{pos:"India es la única potencia capaz de actuar como contrapeso a China en Asia. Su posición en el Quad la convierte en pieza central de la estrategia occidental en el Indo-Pacífico.",ten:"La rivalidad con Pakistán (Cachemira) y la tensión fronteriza con China (Himalaya) son los vectores de riesgo.",out:"India tiene potencial de convertirse en la tercera economía mundial antes de 2030.",risk:"MEDIO-ALTO",inf:"GLOBAL",tgs:["Contrapeso a China","Quad Indo-Pacífico","No-alineamiento","Mayor democracia del mundo"]}}
};

const ISO_MAP={724:"Spain",250:"France",840:"United States of America",156:"China",643:"Russia",276:"Germany",76:"Brazil",392:"Japan",356:"India"};

// ── RENDER ────────────────────────────────────────────────────────────────────
function rDatos(d){const b=d.basic;return`<div class="dg"><div class="dc"><div class="dl">Capital</div><div class="dv">${b.capital}</div></div><div class="dc"><div class="dl">Población</div><div class="dv big">${b.population}</div></div><div class="dc"><div class="dl">Superficie</div><div class="dv">${b.area}</div></div><div class="dc"><div class="dl">Idioma oficial</div><div class="dv">${b.language}</div></div><div class="dc"><div class="dl">Moneda</div><div class="dv">${b.currency}</div></div><div class="dc"><div class="dl">PIB total</div><div class="dv big">${b.gdp}</div></div><div class="dc"><div class="dl">PIB per cápita</div><div class="dv">${b.gdp_pc}</div></div><div class="dc"><div class="dl">Índice HDI</div><div class="dv">${b.hdi}</div></div></div><div class="ab"><div class="at">Contexto</div><p>Datos fundamentales de ${d.name}. Explora los niveles del menú para acceder al análisis completo.</p></div>`;}

function rPol(d){const p=d.pol;const bars=Object.entries(p.scores).map(([k,v])=>{const c=v>70?'var(--acc3)':v>40?'var(--acc)':'var(--acc2)';return`<div class="sr2x"><div class="sl">${k}</div><div class="sb2"><div class="sf2" data-v="${v}" style="background:${c}"></div></div><div class="sv">${v}</div></div>`;}).join('');return`<div class="dg"><div class="dc f"><div class="dl">Sistema de gobierno</div><div class="dv">${p.system}</div></div><div class="dc"><div class="dl">Jefe de Estado</div><div class="dv">${p.je}</div></div><div class="dc"><div class="dl">Jefe de Gobierno</div><div class="dv">${p.jg}</div></div><div class="dc f"><div class="dl">Partido / Coalición</div><div class="dv">${p.party}</div></div></div><div class="st">Índices de gobernanza</div>${bars}<div class="st">Organizaciones internacionales</div><div class="tgs">${p.orgs.map(o=>`<span class="tg">${o}</span>`).join('')}</div><div class="st">Perfil político</div><div class="ab"><div class="at">Descripción</div><p>${p.ov}</p></div><div class="tgs" style="margin-top:10px">${p.tags.map(t=>`<span class="tg">${t}</span>`).join('')}</div>`;}

function rAn(d){const a=d.an;const hi=a.risk.includes('MUY')||a.risk==='ALTO';const lo=a.risk==='BAJO';const rc=hi?'var(--acc2)':lo?'var(--acc3)':'var(--acc)';const tc=hi?'r':lo?'g2':'';return`<div class="dg"><div class="dc"><div class="dl">Riesgo geopolítico</div><div class="dv big" style="color:${rc}">${a.risk}</div></div><div class="dc"><div class="dl">Influencia global</div><div class="dv big">${a.inf}</div></div></div><div class="st">Posición estratégica</div><div class="ab"><div class="at">Posicionamiento</div><p>${a.pos}</p></div><div class="st">Tensiones activas</div><div class="ab w"><div class="at">Vectores de inestabilidad</div><p>${a.ten}</p></div><div class="st">Perspectiva</div><div class="ab g"><div class="at">Tendencia a medio plazo</div><p>${a.out}</p></div><div class="st">Etiquetas geopolíticas</div><div class="tgs">${a.tgs.map(t=>`<span class="tg ${tc}">${t}</span>`).join('')}</div>`;}

function rSoon(label){return`<div class="soon-block"><div class="soon-icon">🔒</div><div class="soon-title">${label}</div><div class="soon-sub">Este nivel de análisis está en desarrollo. Pronto estará disponible con contenido detallado.</div><div class="soon-badge">Próximamente</div></div>`;}

// ── MAP ───────────────────────────────────────────────────────────────────────
const svg=d3.select("#ms"),wrap=document.getElementById("mw"),tt=document.getElementById("tt");
let active=null,lv="datos",geo,gNode,proj,pathGen;

function getWH(){return[wrap.clientWidth,wrap.clientHeight];}

function buildMap(world){
  geo=world;
  const[W,H]=getWH();
  proj=d3.geoNaturalEarth1().scale(W/6.2).translate([W/2,H/2]);
  pathGen=d3.geoPath().projection(proj);
  svg.selectAll("*").remove();
  svg.append("rect").attr("width",W).attr("height",H).attr("fill","#050810");
  svg.append("path").datum(d3.geoGraticule()()).attr("d",pathGen).attr("fill","none").attr("stroke","#0c1a26").attr("stroke-width","0.3");
  gNode=svg.append("g");
  const countries=topojson.feature(world,world.objects.countries);
  gNode.selectAll("path").data(countries.features).enter().append("path")
    .attr("class",d=>"cp"+(ISO_MAP[+d.id]?" hd":""))
    .attr("d",pathGen)
    .on("mouseover",function(e,d){const n=ISO_MAP[+d.id],info=n&&DATA[n];if(info){tt.textContent=`${info.flag} ${info.name}`;tt.style.display="block";}d3.select(this).classed("hov",true);})
    .on("mousemove",function(e){tt.style.left=(e.clientX+14)+"px";tt.style.top=(e.clientY-28)+"px";})
    .on("mouseout",function(){tt.style.display="none";d3.select(this).classed("hov",false);})
    .on("click",function(e,d){const n=ISO_MAP[+d.id];if(n&&DATA[n])openC(n);});
  const zoom=d3.zoom().scaleExtent([1,8]).on("zoom",e=>gNode.attr("transform",e.transform));
  svg.call(zoom);
  document.getElementById("loading").style.display="none";
}

function buildFallback(){
  const[W,H]=getWH();
  proj=d3.geoNaturalEarth1().scale(W/6.2).translate([W/2,H/2]);
  pathGen=d3.geoPath().projection(proj);
  svg.selectAll("*").remove();
  svg.append("rect").attr("width",W).attr("height",H).attr("fill","#050810");
  svg.append("path").datum({type:"Sphere"}).attr("d",pathGen).attr("fill","#081422").attr("stroke","#1a2a3a").attr("stroke-width","0.5");
  svg.append("path").datum(d3.geoGraticule()()).attr("d",pathGen).attr("fill","none").attr("stroke","#0c1a26").attr("stroke-width","0.3");
  gNode=svg.append("g");
  const boxes=[{name:"Spain",c:[[-9.3,35.9],[3.3,43.8]]},{name:"France",c:[[-4.8,42.3],[8.2,51.1]]},{name:"Germany",c:[[6,47.3],[15,55]]},{name:"United States of America",c:[[-125,24],[-66,50]]},{name:"Brazil",c:[[-74,-33],[-34,5]]},{name:"Russia",c:[[28,41],[190,82]]},{name:"China",c:[[73,18],[135,53]]},{name:"India",c:[[68,8],[97,37]]},{name:"Japan",c:[[129,31],[146,45]]}];
  boxes.forEach(cb=>{
    const[[x1,y1],[x2,y2]]=cb.c;
    const g={type:"Feature",geometry:{type:"Polygon",coordinates:[[[x1,y1],[x2,y1],[x2,y2],[x1,y2],[x1,y1]]]}};
    gNode.append("path").datum(g).attr("class","cp hd").attr("data-name",cb.name).attr("d",pathGen)
      .on("mouseover",function(e){const d=DATA[cb.name];tt.textContent=`${d.flag} ${d.name}`;tt.style.display="block";d3.select(this).classed("hov",true);})
      .on("mousemove",function(e){tt.style.left=(e.clientX+14)+"px";tt.style.top=(e.clientY-28)+"px";})
      .on("mouseout",function(){tt.style.display="none";d3.select(this).classed("hov",false);})
      .on("click",()=>openC(cb.name));
  });
  const zoom=d3.zoom().scaleExtent([1,8]).on("zoom",e=>gNode.attr("transform",e.transform));
  svg.call(zoom);
  document.getElementById("loading").style.display="none";
}

async function loadMap(){
  const sources=["https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json","https://unpkg.com/world-atlas@2/countries-110m.json"];
  for(const url of sources){try{const d=await d3.json(url);buildMap(d);return;}catch(e){}}
  buildFallback();
}
loadMap();
window.addEventListener("resize",()=>{if(geo)buildMap(geo);else buildFallback();});

// ── PANEL ─────────────────────────────────────────────────────────────────────
function buildNav(){
  const nav=document.getElementById("pnav");
  nav.innerHTML=LEVELS.map(l=>`
    <div class="pnav-item${l.id===lv?' on':''}${!l.ready?' soon':''}" onclick="setLv('${l.id}')">
      <span class="ni">${l.num}</span>
      <span class="nl">${l.label}</span>
      ${!l.ready?'<span class="pnav-soon">Próximo</span>':''}
    </div>
  `).join('');
}

function openC(name){
  active=name; lv="datos";
  const d=DATA[name];
  document.getElementById("cf").textContent=d.flag;
  document.getElementById("cn").textContent=d.name;
  document.getElementById("cr").textContent=d.region;
  buildNav();
  rvLv();
  document.getElementById("pnl").classList.add("open");
  document.getElementById("hint").classList.add("gone");
  document.getElementById("empty").style.display="none";
  if(gNode)gNode.selectAll(".cp").classed("act",function(){return d3.select(this).attr("data-name")===name;});
}

function closePanel(){
  document.getElementById("pnl").classList.remove("open");
  document.getElementById("empty").style.display="block";
  if(gNode)gNode.selectAll(".cp").classed("act",false);
  active=null;
}

function setLv(l){
  lv=l;
  buildNav();
  rvLv();
}

function rvLv(){
  const pc=document.getElementById("pcontent");
  const d=DATA[active];
  const level=LEVELS.find(l=>l.id===lv);
  pc.style.opacity="0";
  setTimeout(()=>{
    if(!level.ready){pc.innerHTML=rSoon(level.label);}
    else if(lv==="datos"){pc.innerHTML=rDatos(d);}
    else if(lv==="politico"){pc.innerHTML=rPol(d);}
    else if(lv==="analisis"){pc.innerHTML=rAn(d);}
    pc.style.transition="opacity .25s";pc.style.opacity="1";
    setTimeout(()=>{pc.querySelectorAll(".sf2").forEach(el=>el.style.width=el.dataset.v+"%");},60);
  },80);
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
const sinput=document.getElementById("sinput"),sres=document.getElementById("sres");
sinput.addEventListener("input",function(){
  const q=this.value.toLowerCase().trim();
  if(!q){sres.style.display="none";return;}
  const m=Object.entries(DATA).filter(([k,v])=>v.name.toLowerCase().includes(q)||k.toLowerCase().includes(q));
  if(!m.length){sres.style.display="none";return;}
  sres.innerHTML=m.map(([k,v])=>`<div class="sri" onclick="pickS('${k}')"><span class="sf">${v.flag}</span><span class="sn">${v.name}</span><span class="sr2">${v.region}</span></div>`).join('');
  sres.style.display="block";
});
function pickS(n){sinput.value="";sres.style.display="none";openC(n);}
document.addEventListener("click",e=>{if(!e.target.closest("#sw"))sres.style.display="none";});
setTimeout(()=>document.getElementById("hint").classList.add("gone"),5000);
</script>
</body>
